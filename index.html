<!DOCTYPE html>
<html>

<head>
<style>

  body {
  background: #0f172a;
  transition: background 0.4s ease;
}

  body {
  background: #0f172a; /* deep blue-gray */
}
#img3 {
  transition: transform 0.5s ease;
}

#img3:hover {
  transform: rotate(360deg);
}

/* 🔥 ARROW ICON (ICON 5) */
.arrow-icon {
  position: relative;
  width: 100%
  height: 100%
  overflow: hidden;
  display: inline-block;
}

/* SLIDE LAYER */
.arrow-slide {
  position: absolute;
  left: 20px;
  transition: transform 0.6s ease;
}

/* SPIN LAYER */
.arrow-spin {
  width: 300px;
  transition: transform 0.4s ease;
}

/* positions */
.red-slide { top: -20px; }
.blue-slide { top: 10px; }

/* 🔥 HOVER ON */
.arrow-icon:hover .arrow-spin {
  transform: rotate(360deg);
}

.arrow-icon:hover .red-slide {
  transform: translateX(-400px);
  transition-delay: 0.2s;   /* slide AFTER spin */
}

.arrow-icon:hover .blue-slide {
  transform: translateX(450px);
  transition-delay: 0.2s;
}

/* 🔥 HOVER OFF (reverse timing) */
.arrow-slide {
  transition-delay: 0s;     /* slide back immediately */
}

.arrow-spin {
  transition-delay: 0.2s;   /* unspin AFTER slide back */
}

.fade-icon {
  position: relative;
  width: 200px;
  height: auto;
  display: inline-block;
}

.icon {
  position: absolute;
  width: 100%;
  top: 0;
  left: 0;
  transition: opacity 0.6s ease;
}

/* start state */
.normal {
  opacity: 1;
}

.hover {
  opacity: 0;
}

/* hover state */
.fade-icon:hover .normal {
  opacity: 0;
}

.fade-icon:hover .hover {
  opacity: 1;
}

.star-icon {
  position: relative;
  width: 260px;
  height: 280px;
  display: inline-block;
  vertical-align: middle;
  overflow: visible;
}

.star-icon {
  position: relative;
  width: 100%;
  height: 100%; /* 🔥 increased so bottom isn't cut */
  display: inline-block;
  vertical-align: middle;
  overflow: hidden; /* keep animation clean */
}

/* KEEP YOUR EXACT POSITIONS */
.star-part {
  position: absolute;
  transition: transform 0.6s ease, opacity 0.4s ease;
}

/* left red piece */
.red-star {
  width: 50px;
  left: -31px;
  top: 25px;
  z-index: 1;
}

/* right purple piece */
.purple-star {
  width: 170px;
  left: 55px;
  top: 26px;
  z-index: 2;
}

/* purple oval */
.purple-ring {
  width: 170px;
  left: 15px;
  top: -50px;
  z-index: 3;
}

/* white oval */
.white-ring {
  width: 170px;
  left: 15px;
  top: -50px;
  z-index: 4;
}

/* NEW HOVER ICON */
.star-hover {
  position: absolute;
  width: 170px;
  left: 0px;
  top: 10px;
  opacity: 0;
  z-index: 0;
  transition: opacity 0.5s ease;
}

/* 🔥 HOVER ANIMATION */

/* split star */
.star-icon:hover .red-star {
  transform: translateX(-300px);
}

.star-icon:hover .purple-star {
  transform: translateX(300px);
}

/* halo goes up */
.star-icon:hover .purple-ring,
.star-icon:hover .white-ring {
  transform: translateY(-150px);
}

/* reveal new icon */
.star-icon:hover .star-hover {
  opacity: 1;
}

.fade-icon {
  position: relative;
  width: 200px;
  display: inline-block;
}

.icon {
  position: absolute;
  width: 100%;
  top: 0;
  left: 0;
  transition: opacity 0.6s ease;
}

.normal {
  opacity: 1;
}

.hover {
  opacity: 0;
}

.fade-icon:hover .normal {
  opacity: 0;
}

.fade-icon:hover .hover {
  opacity: 1;
}

.icon-container {
  display: grid;
  grid-template-columns: repeat(3, 150px);
  grid-template-rows: repeat(3, 150px);
  gap: 30px;

  justify-content: center;
  align-content: center;
  height: 100vh;
}

/* EVERY grid cell */
.icon-container > * {
  width: 150px;
  height: 150px;

  display: flex;
  align-items: center;
  justify-content: center;

  position: relative;
  overflow: hidden; /* 🔥 prevents spilling */
}

.icon-container img {
  width: 100%;
  height: 100%;
  object-fit: contain;


</style>
</head>
